<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">

            </defs>
            <path d="M32 4L8 16v16c0 14.4 10.24 27.84 24 32 13.76-4.16 24-17.6 24-32V16L32 4z" stroke="url(#logo-grad)"
              stroke-width="3.5" fill="none" stroke-linejoin="round" />

            <circle cx="20" cy="34" r="3" fill="url(#logo-grad)" />
            <circle cx="44" cy="34" r="3" fill="url(#logo-grad)" />
            <circle cx="26" cy="46" r="2.5" fill="url(#logo-grad)" />
            <circle cx="38" cy="46" r="2.5" fill="url(#logo-grad)" />
            <circle cx="32" cy="38" r="2.5" fill="url(#logo-grad)" />

            <line x1="32" y1="24" x2="44" y2="34" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.6" />

            <line x1="44" y1="34" x2="38" y2="46" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.6" />
            <line x1="32" y1="24" x2="32" y2="38" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.6" />
            <line x1="20" y1="34" x2="32" y2="38" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.6" />
            <line x1="44" y1="34" x2="32" y2="38" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.6" />
            <line x1="26" y1="46" x2="38" y2="46" stroke="url(#logo-grad)" stroke-width="1.5" opacity="0.6" />
          </svg>
          <div>
            <span class="sidebar-brand"><span class="brand-ad">Active Directory</span> <span
                class="brand-arsenal">Arsenal</span></span>
            <span class="sidebar-version">v1.1</span>
          </div>
        </div>
        <button class="theme-toggle" id="theme-toggle" title="Toggle Light/Dark Mode">
          <span class="theme-icon" id="theme-icon">🌙</span>
        </button>
      </div>
      <div class="sidebar-search">
        <input type="text" class="search-input" placeholder="Search sections...">
      </div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <!-- Generated by JS -->
      </nav>
      <div class="sidebar-footer">
        <div class="author-credit">
          <span class="credit-label">Created by</span>
          <a href="https://www.linkedin.com/in/abdelrahman-alaraby/" target="_blank" rel="noopener" class="credit-link">
            <svg class="linkedin-icon" viewBox="0 0 24 24" width="14" height="14" fill="currentColor">
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
            </svg>
            @abdelrahman_alaraby
          </a>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <!-- VARIABLE BAR -->
      <div class="var-bar">
        <div class="var-bar-toggle">
          <span class="var-bar-title">⚡ Target Variables — Live Command Injection</span>
          <span class="var-bar-chevron">▾</span>
        </div>
        <div class="var-grid">
          <div class="var-group">
            <label class="var-label">Target DC IP</label>
            <input class="var-input" data-var="TARGET_DC" placeholder="10.0.0.1">
          </div>
          <div class="var-group">
            <label class="var-label">Domain</label>
            <input class="var-input" data-var="DOMAIN" placeholder="corp.local">
          </div>
          <div class="var-group">
            <label class="var-label">Username</label>
            <input class="var-input" data-var="USERNAME" placeholder="jsmith">
          </div>
          <div class="var-group">
            <label class="var-label">Password</label>
            <input class="var-input" data-var="PASSWORD" placeholder="P@ssw0rd!">
          </div>
          <div class="var-group">
            <label class="var-label">NT Hash</label>
            <input class="var-input" data-var="HASH" placeholder="aad3b435...">
          </div>
          <div class="var-group">
            <label class="var-label">Attacker IP</label>
            <input class="var-input" data-var="ATTACKER_IP" placeholder="10.0.0.50">
          </div>
          <div class="var-group">
            <label class="var-label">CA Name</label>
            <input class="var-input" data-var="CA_NAME" placeholder="CORP-CA">
          </div>
          <div class="var-group">
            <label class="var-label">Target Host</label>
            <input class="var-input" data-var="TARGET_HOST" placeholder="WS01.corp.local">
          </div>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="content-area">
        <div class="content-controls">
          <button class="ctrl-btn" id="expand-all">▾ Expand All</button>
          <button class="ctrl-btn" id="collapse-all">▸ Collapse All</button>
        </div>
        <div id="sections-container">
          <!-- Generated by JS from data.js -->
        </div>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="data2.js"></script>
  <script src="data3.js"></script>
  <script src="app.js"></script>
</body>

</html>
